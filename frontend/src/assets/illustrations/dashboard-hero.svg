<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="90" x2="1120" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="430" y1="240" x2="980" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EF4444" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="soft" x="-40" y="-40" width="1280" height="980">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Soft background -->
  <rect x="0" y="0" width="1200" height="900" rx="72" fill="url(#bg)"/>
  <path d="M234 192C356 72 508 64 620 124C732 184 772 312 904 330C1036 348 1120 254 1200 160V900H0V320C78 292 156 270 234 192Z" fill="url(#accent)"/>

  <!-- Cute floating chips -->
  <g filter="url(#soft)" opacity="0.75">
    <circle cx="950" cy="170" r="56" fill="#EF4444" fill-opacity="0.12"/>
    <circle cx="1040" cy="250" r="70" fill="#F97316" fill-opacity="0.10"/>
    <circle cx="880" cy="260" r="42" fill="#0F172A" fill-opacity="0.06"/>
  </g>

  <!-- Laptop (cartoon) -->
  <g filter="url(#shadow)">
    <rect x="356" y="220" width="520" height="360" rx="34" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="4"/>
    <rect x="384" y="248" width="464" height="276" rx="22" fill="#F6F7FB"/>

    <!-- Dashboard blocks on screen -->
    <rect x="410" y="278" width="190" height="78" rx="18" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="3"/>
    <rect x="618" y="278" width="204" height="78" rx="18" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="3"/>
    <rect x="410" y="374" width="412" height="134" rx="22" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="3"/>

    <!-- small progress bars -->
    <rect x="432" y="308" width="132" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="432" y="308" width="86" height="10" rx="5" fill="#EF4444" fill-opacity="0.80"/>
    <rect x="640" y="308" width="152" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="640" y="308" width="104" height="10" rx="5" fill="#F97316" fill-opacity="0.80"/>

    <!-- chart squiggle -->
    <path d="M438 452C468 420 496 468 526 440C556 412 584 468 614 438C644 408 678 456 706 430C734 404 770 444 796 418" stroke="#EF4444" stroke-opacity="0.75" stroke-width="8" stroke-linecap="round"/>

    <!-- laptop base -->
    <path d="M310 590C310 568 328 550 350 550H882C904 550 922 568 922 590V614C922 636 904 654 882 654H350C328 654 310 636 310 614V590Z" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="4"/>
    <rect x="520" y="610" width="192" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
  </g>

  <!-- Friendly doodles: notebook + pencil -->
  <g filter="url(#shadow)">
    <rect x="160" y="560" width="170" height="210" rx="26" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="4"/>
    <rect x="184" y="594" width="122" height="12" rx="6" fill="#E2E8F0"/>
    <rect x="184" y="626" width="132" height="12" rx="6" fill="#E2E8F0"/>
    <rect x="184" y="658" width="96" height="12" rx="6" fill="#E2E8F0"/>
    <path d="M184 708H308" stroke="#EF4444" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>

    <path d="M320 736L396 660" stroke="#F97316" stroke-width="20" stroke-linecap="round"/>
    <path d="M382 674L414 642" stroke="#0F172A" stroke-opacity="0.40" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Task bubbles (cartoon UI chips) -->
  <g filter="url(#shadow)">
    <rect x="884" y="420" width="240" height="92" rx="26" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="4"/>
    <circle cx="916" cy="456" r="12" fill="#EF4444" fill-opacity="0.75"/>
    <rect x="940" y="446" width="156" height="16" rx="8" fill="#0F172A" fill-opacity="0.10"/>
    <rect x="940" y="472" width="120" height="16" rx="8" fill="#0F172A" fill-opacity="0.08"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="868" y="540" width="270" height="110" rx="28" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="4"/>
    <rect x="896" y="574" width="214" height="18" rx="9" fill="#0F172A" fill-opacity="0.08"/>
    <rect x="896" y="604" width="168" height="18" rx="9" fill="#0F172A" fill-opacity="0.06"/>
    <rect x="896" y="634" width="96" height="18" rx="9" fill="#F97316" fill-opacity="0.18"/>
  </g>
</svg>
