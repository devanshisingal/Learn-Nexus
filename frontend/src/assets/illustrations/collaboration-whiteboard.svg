    <rect x="610" y="190" width="120" height="86" rx="18" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="3"/>
    <rect x="628" y="212" width="84" height="12" rx="6" fill="#0F172A" fill-opacity="0.08"/>
    <rect x="628" y="238" width="64" height="12" rx="6" fill="#0F172A" fill-opacity="0.06"/>
  </g>

  <!-- cursor dots -->
  <circle cx="204" cy="176" r="6" fill="#0F172A" fill-opacity="0.18"/>
  <circle cx="226" cy="176" r="6" fill="#EF4444" fill-opacity="0.40"/>
  <circle cx="248" cy="176" r="6" fill="#F97316" fill-opacity="0.35"/>
