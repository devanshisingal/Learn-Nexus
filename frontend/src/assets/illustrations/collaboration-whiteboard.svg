<svg width="900" height="450" viewBox="0 0 900 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="860" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="warm" x1="120" y1="70" x2="520" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EF4444" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="450" rx="36" fill="url(#bg)"/>
  <path d="M60 120C120 40 260 30 340 70C420 110 480 170 560 150C640 130 700 70 760 60C820 50 870 70 900 90V450H0V180C20 170 40 150 60 120Z" fill="url(#warm)"/>

