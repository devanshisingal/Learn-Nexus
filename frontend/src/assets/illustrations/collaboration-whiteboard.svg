    <rect x="110" y="84" width="680" height="282" rx="32" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.10" stroke-width="4"/>
    <rect x="152" y="126" width="596" height="198" rx="24" fill="#F6F7FB"/>

    <!-- title chips -->
    <rect x="168" y="144" width="174" height="18" rx="9" fill="#0F172A" fill-opacity="0.08"/>
    <rect x="352" y="144" width="96" height="18" rx="9" fill="#EF4444" fill-opacity="0.18"/>
    <rect x="456" y="144" width="86" height="18" rx="9" fill="#F97316" fill-opacity="0.18"/>

    <!-- sketch + equation -->
    <path d="M182 246C224 212 266 284 310 238C354 192 398 284 440 228C482 172 542 260 586 214" stroke="#EF4444" stroke-opacity="0.70" stroke-width="10" stroke-linecap="round"/>
    <path d="M182 284H430" stroke="#0F172A" stroke-opacity="0.10" stroke-width="10" stroke-linecap="round"/>
    <path d="M182 308H360" stroke="#0F172A" stroke-opacity="0.08" stroke-width="10" stroke-linecap="round"/>

